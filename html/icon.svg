<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Runner silhouette (white stick figure, dynamic running pose) -->

  <!-- Head -->
  <circle cx="56" cy="17" r="7.5" fill="white"/>

  <!-- Torso (leaning forward) -->
  <line x1="53" y1="24.5" x2="44" y2="51" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Lead arm (right arm, swinging forward-up) -->
  <polyline points="50,31 64,26 70,35" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Trail arm (left arm, swinging back) -->
  <polyline points="50,31 36,40 30,33" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Lead leg (right leg, striding forward) -->
  <polyline points="44,51 57,67 51,82" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Trail leg (left leg, toe-off) -->
  <polyline points="44,51 35,66 22,60" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Calf bandage: runs along the calf (parallel to leg direction ~112°) -->
  <g transform="translate(54,75) rotate(112)">
    <rect x="-9" y="-4" width="18" height="8" rx="3" fill="#FDEBD0"/>
    <line x1="-5" y1="-4" x2="-5" y2="4" stroke="#D4A97C" stroke-width="1.2"/>
    <line x1="0"  y1="-4" x2="0"  y2="4" stroke="#D4A97C" stroke-width="1.2"/>
    <line x1="5"  y1="-4" x2="5"  y2="4" stroke="#D4A97C" stroke-width="1.2"/>
  </g>

  <!-- Pain sparkles next to calf -->
  <g stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9">
    <line x1="62" y1="70" x2="66" y2="67"/>
    <line x1="63" y1="75" x2="68" y2="75"/>
    <line x1="62" y1="80" x2="66" y2="83"/>
  </g>
</svg>
