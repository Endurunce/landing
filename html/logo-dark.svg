<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 90">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#8aab7e"/>
      <stop offset="100%" stop-color="#5a7a52"/>
    </linearGradient>
  </defs>

  <rect x="2" y="5" width="80" height="80" rx="18" fill="url(#iconGrad)"/>

  <circle cx="51" cy="19" r="7" fill="white"/>
  <line x1="48" y1="26" x2="40" y2="50" stroke="white" stroke-width="3.8" stroke-linecap="round"/>
  <polyline points="45,32 58,27 64,36" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polyline points="45,32 32,40 26,33" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polyline points="40,50 52,64 46,78" stroke="white" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polyline points="40,50 31,63 18,57" stroke="white" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Calf bandage along leg -->
  <g transform="translate(49,71) rotate(112)">
    <rect x="-8" y="-3.5" width="16" height="7" rx="2.5" fill="#FDEBD0"/>
    <line x1="-4.5" y1="-3.5" x2="-4.5" y2="3.5" stroke="#D4A97C" stroke-width="1"/>
    <line x1="0"    y1="-3.5" x2="0"    y2="3.5" stroke="#D4A97C" stroke-width="1"/>
    <line x1="4.5"  y1="-3.5" x2="4.5"  y2="3.5" stroke="#D4A97C" stroke-width="1"/>
  </g>

  <!-- Pain sparkles -->
  <g stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.9">
    <line x1="57" y1="65" x2="60" y2="62"/>
    <line x1="58" y1="70" x2="62" y2="70"/>
    <line x1="57" y1="75" x2="60" y2="78"/>
  </g>

  <!-- Wordmark dark variant -->
  <text
    x="100" y="60"
    font-family="'Trebuchet MS', 'Arial Black', Arial, sans-serif"
    font-weight="800"
    font-size="42"
    letter-spacing="-1"
    fill="#2d2720">Endur</text>
  <text
    x="222" y="60"
    font-family="'Trebuchet MS', 'Arial Black', Arial, sans-serif"
    font-weight="800"
    font-size="42"
    letter-spacing="-1"
    fill="#5a7a52">unce</text>
</svg>
