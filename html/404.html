<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Pagina niet gevonden | Endurunce</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="theme-color" content="#5a7a52">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f3ee;
      color: #2d2720;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 480px; }
    .code {
      font-size: 6rem;
      font-weight: 800;
      color: #5a7a52;
      line-height: 1;
      margin-bottom: 1rem;
      letter-spacing: -0.04em;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: #6a5e54;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      background: #5a7a52;
      color: #fff;
      text-decoration: none;
      padding: 0.75rem 1.75rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    a:hover { background: #4a6844; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Pagina niet gevonden</h1>
    <p>Deze route bestaat niet. Misschien ben je verkeerd afgeslagen — dat overkomt de beste lopers.</p>
    <a href="/">Terug naar home</a>
  </div>
</body>
</html>
